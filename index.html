<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRM Pro - Gestão de Clientes</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: 'Segoe UI', sans-serif; }
    .modal { animation: fadeIn 0.3s; }
    @keyframes fadeIn { from {opacity: 0;} to {opacity: 1;} }
  </style>
</head>
<body class="bg-gray-100">

<div class="flex h-screen">

  <!-- Sidebar -->
  <div class="w-72 bg-gray-900 text-white">
    <div class="p-8 text-3xl font-bold border-b border-gray-800 flex items-center gap-3">
      <i class="fas fa-chart-line"></i>
      <span>CRM Pro</span>
    </div>
    
    <nav class="mt-8">
      <a href="#" onclick="showSection('dashboard')" class="nav-item flex items-center px-8 py-4 hover:bg-gray-800 text-lg">
        <i class="fas fa-home mr-4"></i> Dashboard
      </a>
      <a href="#" onclick="showSection('clientes')" class="nav-item flex items-center px-8 py-4 hover:bg-gray-800 text-lg">
        <i class="fas fa-users mr-4"></i> Clientes
      </a>
      <a href="#" onclick="showSection('novo')" class="nav-item flex items-center px-8 py-4 hover:bg-gray-800 text-lg">
        <i class="fas fa-user-plus mr-4"></i> Novo Cliente
      </a>
      <a href="#" onclick="showSection('interacoes')" class="nav-item flex items-center px-8 py-4 hover:bg-gray-800 text-lg">
        <i class="fas fa-comments mr-4"></i> Interações
      </a>
    </nav>
  </div>

  <!-- Main Content -->
  <div class="flex-1 overflow-auto">
    <header class="bg-white shadow p-5 flex justify-between items-center">
      <h1 id="page-title" class="text-3xl font-semibold text-gray-800">Dashboard</h1>
    </header>

    <!-- ==================== DASHBOARD ==================== -->
    <div id="dashboard" class="p-8">
      <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
        <div class="bg-white rounded-2xl p-6 shadow">
          <p class="text-gray-500">Total de Clientes</p>
          <p id="total-clientes" class="text-5xl font-bold mt-3">0</p>
        </div>
        <div class="bg-white rounded-2xl p-6 shadow">
          <p class="text-gray-500">Clientes Ativos</p>
          <p id="ativos" class="text-5xl font-bold mt-3 text-green-600">0</p>
        </div>
        <div class="bg-white rounded-2xl p-6 shadow">
          <p class="text-gray-500">Leads</p>
          <p id="leads" class="text-5xl font-bold mt-3 text-amber-600">0</p>
        </div>
        <div class="bg-white rounded-2xl p-6 shadow">
          <p class="text-gray-500">Interações Hoje</p>
          <p id="interacoes-hoje" class="text-5xl font-bold mt-3">0</p>
        </div>
      </div>
    </div>

    <!-- ==================== LISTA DE CLIENTES ==================== -->
    <div id="clientes" class="p-8 hidden">
      <div class="flex gap-4 mb-6">
        <input type="text" id="search" placeholder="🔍 Buscar por nome, empresa ou email..." 
               class="flex-1 border border-gray-300 rounded-xl px-5 py-3 focus:outline-none focus:border-blue-500" onkeyup="filtrarTabela()">
        
        <select id="filtro-status" onchange="filtrarTabela()" class="border border-gray-300 rounded-xl px-5 py-3">
          <option value="">Todos os Status</option>
          <option value="Ativo">Ativo</option>
          <option value="Lead">Lead</option>
          <option value="Em negociação">Em negociação</option>
          <option value="Inativo">Inativo</option>
        </select>
      </div>

      <div class="bg-white rounded-2xl shadow overflow-hidden">
        <table class="w-full">
          <thead class="bg-gray-50">
            <tr>
              <th class="p-5 text-left">Nome</th>
              <th class="p-5 text-left">Empresa</th>
              <th class="p-5 text-left">Contato</th>
              <th class="p-5 text-left">Status</th>
              <th class="p-5 text-center">Ações</th>
            </tr>
          </thead>
          <tbody id="tabela-clientes" class="divide-y"></tbody>
        </table>
      </div>
      <button onclick="exportarCSV()" class="mt-6 bg-green-600 text-white px-6 py-3 rounded-xl hover:bg-green-700 flex items-center gap-2">
        <i class="fas fa-download"></i> Exportar para CSV
      </button>
    </div>

    <!-- ==================== NOVO CLIENTE ==================== -->
    <div id="novo" class="p-8 hidden">
      <div class="max-w-2xl mx-auto bg-white rounded-3xl shadow p-10">
        <h2 class="text-3xl font-semibold mb-8">Novo Cliente</h2>
        <form id="form-cliente" onsubmit="salvarCliente(event)">
          <!-- campos aqui (mesmo do anterior, mas mais bonito) -->
          <div class="grid grid-cols-2 gap-6">
            <div>
              <label class="block text-sm font-medium mb-2">Nome *</label>
              <input type="text" id="nome" required class="w-full border rounded-2xl px-5 py-4">
            </div>
            <div>
              <label class="block text-sm font-medium mb-2">Empresa</label>
              <input type="text" id="empresa" class="w-full border rounded-2xl px-5 py-4">
            </div>
          </div>
          <div class="grid grid-cols-2 gap-6 mt-6">
            <div>
              <label class="block text-sm font-medium mb-2">E-mail</label>
              <input type="email" id="email" class="w-full border rounded-2xl px-5 py-4">
            </div>
            <div>
              <label class="block text-sm font-medium mb-2">Telefone</label>
              <input type="tel" id="telefone" class="w-full border rounded-2xl px-5 py-4">
            </div>
          </div>
          <div class="mt-6">
            <label class="block text-sm font-medium mb-2">Cargo</label>
            <input type="text" id="cargo" class="w-full border rounded-2xl px-5 py-4">
          </div>
          <div class="mt-6">
            <label class="block text-sm font-medium mb-2">Status</label>
            <select id="status" class="w-full border rounded-2xl px-5 py-4">
              <option value="Ativo">Ativo</option>
              <option value="Lead">Lead</option>
              <option value="Em negociação">Em negociação</option>
              <option value="Inativo">Inativo</option>
            </select>
          </div>
          <button type="submit" class="mt-10 w-full bg-blue-600 text-white py-4 rounded-2xl text-lg font-semibold hover:bg-blue-700">
            Salvar Cliente
          </button>
        </form>
      </div>
    </div>

    <!-- ==================== INTERAÇÕES ==================== -->
    <div id="interacoes" class="p-8 hidden">
      <div class="bg-white rounded-3xl shadow p-8 max-w-2xl mx-auto">
        <h2 class="text-2xl font-semibold mb-6">Registrar Nova Interação</h2>
        <select id="cliente-interacao" class="w-full border rounded-2xl px-5 py-4 mb-6"></select>
        <select id="tipo-interacao" class="w-full border rounded-2xl px-5 py-4 mb-6">
          <option>Ligação</option>
          <option>Reunião</option>
          <option>WhatsApp</option>
          <option>E-mail</option>
          <option>Visita</option>
        </select>
        <textarea id="descricao" rows="5" placeholder="Descreva o que foi conversado..." class="w-full border rounded-2xl px-5 py-4"></textarea>
        <button onclick="registrarInteracao()" class="mt-6 w-full bg-green-600 text-white py-4 rounded-2xl text-lg font-semibold hover:bg-green-700">
          Registrar Interação
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Modal de Edição -->
<div id="modal-editar" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center">
  <div class="bg-white rounded-3xl p-8 w-full max-w-lg modal">
    <h2 class="text-2xl font-bold mb-6">Editar Cliente</h2>
    <input type="hidden" id="edit-id">
    <div class="space-y-5">
      <input type="text" id="edit-nome" class="w-full border rounded-2xl px-5 py-4" placeholder="Nome">
      <input type="text" id="edit-empresa" class="w-full border rounded-2xl px-5 py-4" placeholder="Empresa">
      <input type="email" id="edit-email" class="w-full border rounded-2xl px-5 py-4" placeholder="Email">
      <input type="tel" id="edit-telefone" class="w-full border rounded-2xl px-5 py-4" placeholder="Telefone">
      <select id="edit-status" class="w-full border rounded-2xl px-5 py-4">
        <option value="Ativo">Ativo</option>
        <option value="Lead">Lead</option>
        <option value="Em negociação">Em negociação</option>
        <option value="Inativo">Inativo</option>
      </select>
    </div>
    <div class="flex gap-4 mt-8">
      <button onclick="fecharModal()" class="flex-1 py-4 border rounded-2xl font-medium">Cancelar</button>
      <button onclick="salvarEdicao()" class="flex-1 py-4 bg-blue-600 text-white rounded-2xl font-medium">Salvar Alterações</button>
    </div>
  </div>
</div>

<script>
// ==================== Variáveis ====================
let clientes = JSON.parse(localStorage.getItem('clientes')) || [];
let interacoes = JSON.parse(localStorage.getItem('interacoes')) || [];

// ==================== Funções Básicas ====================
function salvarNoLocalStorage() {
  localStorage.setItem('clientes', JSON.stringify(clientes));
  localStorage.setItem('interacoes', JSON.stringify(interacoes));
}

function showSection(section) {
  document.querySelectorAll('#dashboard, #clientes, #novo, #interacoes').forEach(el => el.classList.add('hidden'));
  document.getElementById(section).classList.remove('hidden');
  document.getElementById('page-title').textContent = {
    'dashboard': 'Dashboard',
    'clientes': 'Meus Clientes',
    'novo': 'Novo Cliente',
    'interacoes': 'Interações'
  }[section];

  if (section === 'clientes') filtrarTabela();
  if (section === 'interacoes') carregarSelectClientes();
}

// ==================== Cliente ====================
function salvarCliente(e) {
  e.preventDefault();
  const cliente = {
    id: Date.now(),
    nome: document.getElementById('nome').value,
    empresa: document.getElementById('empresa').value,
    email: document.getElementById('email').value,
    telefone: document.getElementById('telefone').value,
    cargo: document.getElementById('cargo').value,
    status: document.getElementById('status').value,
    data: new Date().toLocaleDateString('pt-BR')
  };

  clientes.push(cliente);
  salvarNoLocalStorage();
  alert('✅ Cliente cadastrado com sucesso!');
  e.target.reset();
  showSection('clientes');
}

function editarCliente(id) {
  const cliente = clientes.find(c => c.id === id);
  if (!cliente) return;

  document.getElementById('edit-id').value = cliente.id;
  document.getElementById('edit-nome').value = cliente.nome;
  document.getElementById('edit-empresa').value = cliente.empresa || '';
  document.getElementById('edit-email').value = cliente.email || '';
  document.getElementById('edit-telefone').value = cliente.telefone || '';
  document.getElementById('edit-status').value = cliente.status;

  document.getElementById('modal-editar').classList.remove('hidden');
}

function salvarEdicao() {
  const id = Number(document.getElementById('edit-id').value);
  const cliente = clientes.find(c => c.id === id);
  if (cliente) {
    cliente.nome = document.getElementById('edit-nome').value;
    cliente.empresa = document.getElementById('edit-empresa').value;
    cliente.email = document.getElementById('edit-email').value;
    cliente.telefone = document.getElementById('edit-telefone').value;
    cliente.status = document.getElementById('edit-status').value;
    
    salvarNoLocalStorage();
    fecharModal();
    filtrarTabela();
    alert('✅ Alterações salvas!');
  }
}

function fecharModal() {
  document.getElementById('modal-editar').classList.add('hidden');
}

function excluirCliente(id) {
  if (confirm('Tem certeza que deseja excluir este cliente?')) {
    clientes = clientes.filter(c => c.id !== id);
    salvarNoLocalStorage();
    filtrarTabela();
  }
}

// ==================== Tabela e Filtros ====================
function filtrarTabela() {
  const termo = document.getElementById('search').value.toLowerCase();
  const statusFiltro = document.getElementById('filtro-status').value;
  
  let filtrados = clientes;

  if (termo) {
    filtrados = filtrados.filter(c => 
      c.nome.toLowerCase().includes(termo) || 
      (c.empresa && c.empresa.toLowerCase().includes(termo)) ||
      (c.email && c.email.toLowerCase().includes(termo))
    );
  }

  if (statusFiltro) {
    filtrados = filtrados.filter(c => c.status === statusFiltro);
  }

  const tbody = document.getElementById('tabela-clientes');
  tbody.innerHTML = '';

  filtrados.forEach(cliente => {
    const tr = document.createElement('tr');
    tr.className = "hover:bg-gray-50";
    tr.innerHTML = `
      <td class="p-5 font-medium">${cliente.nome}</td>
      <td class="p-5">${cliente.empresa || '-'}</td>
      <td class="p-5">${cliente.email || '-'}</td>
      <td class="p-5">
        <span class="px-4 py-1.5 rounded-full text-sm ${cliente.status === 'Ativo' ? 'bg-green-100 text-green-700' : cliente.status === 'Lead' ? 'bg-amber-100 text-amber-700' : 'bg-gray-100 text-gray-700'}">
          ${cliente.status}
        </span>
      </td>
      <td class="p-5 text-center space-x-4">
        <button onclick="editarCliente(${cliente.id})" class="text-blue-600 hover:text-blue-800">
          <i class="fas fa-edit"></i>
        </button>
        <button onclick="excluirCliente(${cliente.id})" class="text-red-600 hover:text-red-800">
          <i class="fas fa-trash"></i>
        </button>
      </td>
    `;
    tbody.appendChild(tr);
  });
}

function exportarCSV() {
  if (clientes.length === 0) return alert("Não há clientes para exportar");
  
  let csv = "Nome,Empresa,Email,Telefone,Status,Data\n";
  clientes.forEach(c => {
    csv += `"${c.nome}","${c.empresa}","${c.email}","${c.telefone}","${c.status}","${c.data}"\n`;
  });

  const blob = new Blob([csv], { type: 'text/csv' });
  const url = window.URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `clientes_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

// ==================== Interações ====================
function carregarSelectClientes() {
  const select = document.getElementById('cliente-interacao');
  select.innerHTML = '<option value="">Selecione um cliente</option>';
  clientes.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c.id;
    opt.textContent = c.nome;
    select.appendChild(opt);
  });
}

function registrarInteracao() {
  const clienteId = document.getElementById('cliente-interacao').value;
  if (!clienteId) return alert("Selecione um cliente");

  interacoes.push({
    id: Date.now(),
    clienteId: Number(clienteId),
    data: new Date().toLocaleString('pt-BR'),
    tipo: document.getElementById('tipo-interacao').value,
    descricao: document.getElementById('descricao').value
  });

  salvarNoLocalStorage();
  alert("✅ Interação registrada com sucesso!");
  document.getElementById('descricao').value = '';
}

// ==================== Dashboard ====================
function atualizarDashboard() {
  document.getElementById('total-clientes').textContent = clientes.length;
  document.getElementById('ativos').textContent = clientes.filter(c => c.status === 'Ativo').length;
  document.getElementById('leads').textContent = clientes.filter(c => c.status === 'Lead').length;
  document.getElementById('interacoes-hoje').textContent = interacoes.length;
}

// Inicialização
window.onload = () => {
  showSection('dashboard');
  atualizarDashboard();
};
</script>
</body>
</html>
